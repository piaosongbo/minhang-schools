<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海闵行区私立学校评价</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .school-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .school-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .school-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .school-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        .school-name {
            font-size: 1.3rem;
            color: #333;
            font-weight: 600;
        }
        .school-type {
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .rating {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .stars {
            color: #ffc107;
            font-size: 1.2rem;
        }
        .score {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff9800;
        }
        .info-row {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #666;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        .tag {
            background: #f5f5f5;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            color: #555;
        }
        .review-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .review-title {
            font-size: 0.9rem;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .review-text {
            font-size: 0.85rem;
            color: #666;
            line-height: 1.6;
        }
        footer {
            text-align: center;
            color: white;
            padding: 40px 0;
            opacity: 0.8;
        }
        .filter-bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar select, .filter-bar input {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .filter-bar button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        .filter-bar button:hover {
            background: #5a6fd6;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏫 上海闵行区私立学校评价</h1>
            <p>汇集真实家长评价，助力择校决策</p>
        </header>

        <div class="filter-bar">
            <select id="typeFilter">
                <option value="">全部类型</option>
                <option value="国际">国际学校</option>
                <option value="双语">双语学校</option>
                <option value="民办">民办学校</option>
            </select>
            <select id="stageFilter">
                <option value="">全部学段</option>
                <option value="小学">小学</option>
                <option value="初中">初中</option>
                <option value="高中">高中</option>
                <option value="K12">K12一贯制</option>
            </select>
            <input type="text" placeholder="搜索学校名称..." id="searchInput">
            <button onclick="filterSchools()">筛选</button>
        </div>

        <div class="school-grid" id="schoolGrid">
            <!-- 学校卡片将通过JS动态生成 -->
        </div>

        <footer>
            <p>© 2024 上海闵行区私立学校评价 | 数据仅供参考</p>
        </footer>
    </div>

    <script>
        const schools = [
            {
                name: "上海星河湾双语学校",
                type: "双语",
                stage: "K12",
                rating: 4.6,
                tuition: "15-18万/年",
                location: "闵行区金都路",
                students: "约2000人",
                tags: ["AP课程", "双语教学", "升学率高"],
                review: "学术氛围浓厚，师资力量强，毕业生多进入世界名校。课业压力较大，适合目标明确的学生。"
            },
            {
                name: "上海协和双语学校（虹桥校区）",
                type: "国际",
                stage: "K12",
                rating: 4.5,
                tuition: "12-20万/年",
                location: "闵行区虹桥镇",
                students: "约1500人",
                tags: ["IB课程", "国际化", "设施一流"],
                review: "国际化程度高，外籍教师比例大。注重全人教育，课外活动丰富。学费较高但物有所值。"
            },
            {
                name: "上海德威英国国际学校",
                type: "国际",
                stage: "K12",
                rating: 4.7,
                tuition: "25-35万/年",
                location: "闵行区马桥镇",
                students: "约800人",
                tags: ["英式教育", "A-Level", "顶尖师资"],
                review: "上海顶尖国际学校之一，纯正英式教育。毕业生多进入牛津剑桥等名校。学费昂贵，门槛较高。"
            },
            {
                name: "上海燎原双语学校",
                type: "双语",
                stage: "K12",
                rating: 4.2,
                tuition: "8-12万/年",
                location: "闵行区平阳路",
                students: "约1800人",
                tags: ["性价比高", "IB认证", "艺术特色"],
                review: "老牌民办学校，性价比不错。近年引进IB课程，国际化程度提升。艺术教育是特色。"
            },
            {
                name: "上海诺达双语学校",
                type: "国际",
                stage: "K12",
                rating: 4.4,
                tuition: "18-25万/年",
                location: "闵行区华漕镇",
                students: "约1200人",
                tags: ["诺德安达集团", "IB课程", "全球资源"],
                review: "诺德安达教育集团成员，可享受全球教育资源。校园设施现代化，师生比优秀。"
            },
            {
                name: "上海美高双语学校",
                type: "双语",
                stage: "K12",
                rating: 4.0,
                tuition: "10-15万/年",
                location: "闵行区北松公路",
                students: "约1000人",
                tags: ["美式教育", "AP课程", "寄宿制"],
                review: "美式教育理念，注重学生个性发展。寄宿条件较好，适合外地学生。学术压力相对适中。"
            },
            {
                name: "上海七宝德怀特高级中学",
                type: "国际",
                stage: "高中",
                rating: 4.8,
                tuition: "16万/年",
                location: "闵行区七宝镇",
                students: "约600人",
                tags: ["七宝中学合作", "IB课程", "升学顶尖"],
                review: "七宝中学与德怀特合作，学术实力强。IB成绩优异，毕业生多进入美国前30大学。竞争激烈。"
            },
            {
                name: "上海民办文绮中学",
                type: "民办",
                stage: "初中",
                rating: 4.3,
                tuition: "3-5万/年",
                location: "闵行区江川路",
                students: "约1200人",
                tags: ["老牌民办", "中考成绩好", "学费亲民"],
                review: "闵行区老牌民办学校，中考成绩稳定。学费相对亲民，是性价比较高的选择。课业管理严格。"
            },
            {
                name: "上海上师初级中学",
                type: "民办",
                stage: "初中",
                rating: 4.1,
                tuition: "3-4万/年",
                location: "闵行区浦江镇",
                students: "约900人",
                tags: ["上师大背景", "师资稳定", "素质教育"],
                review: "上海师范大学背景，师资较稳定。注重素质教育，作业量适中。适合追求全面发展的家庭。"
            }
        ];

        function renderSchools(schoolList) {
            const grid = document.getElementById('schoolGrid');
            grid.innerHTML = schoolList.map(school => `
                <div class="school-card" data-type="${school.type}" data-stage="${school.stage}">
                    <div class="school-header">
                        <div class="school-name">${school.name}</div>
                        <span class="school-type">${school.type}</span>
                    </div>
                    <div class="rating">
                        <span class="stars">${'★'.repeat(Math.floor(school.rating))}${'☆'.repeat(5-Math.floor(school.rating))}</span>
                        <span class="score">${school.rating}</span>
                    </div>
                    <div class="info-row">
                        <div class="info-item">📍 ${school.location}</div>
                        <div class="info-item">👥 ${school.students}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-item">💰 ${school.tuition}</div>
                        <div class="info-item">📚 ${school.stage}</div>
                    </div>
                    <div class="tags">
                        ${school.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div class="review-section">
                        <div class="review-title">家长评价</div>
                        <div class="review-text">${school.review}</div>
                    </div>
                </div>
            `).join('');
        }

        function filterSchools() {
            const type = document.getElementById('typeFilter').value;
            const stage = document.getElementById('stageFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = schools;
            
            if (type) {
                filtered = filtered.filter(s => s.type === type);
            }
            if (stage) {
                filtered = filtered.filter(s => s.stage === stage || s.stage === 'K12');
            }
            if (search) {
                filtered = filtered.filter(s => s.name.toLowerCase().includes(search));
            }

            renderSchools(filtered);
        }

        // 初始化渲染
        renderSchools(schools);
    </script>
</body>
</html>
