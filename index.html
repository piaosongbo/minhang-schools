        }

        .map-link {

            gap: 5px;

</head>
<body>

        </div>

        <footer>
            <p>© 2024 上海闵行区私立学校评价 | 数据仅供参考</p>
        </footer>
    </div>

    <script>
        // 学校数据（包含大致经纬度坐标）
        const schools = [

            },
            {

                review: "七宝中学与德怀特合作，学术实力强。IB成绩优异，毕业生多进入美国前30大学。竞争激烈。"
            },
            {
                name: "上海民办文绮中学",
                type: "民办",
                stage: "初中",
                rating: 4.3,
                tuition: "3-5万/年",
                location: "闵行区江川路",
                address: "上海市闵行区江川东路",
                lat: 31.0056,
                lng: 121.4256,
                students: "约1200人",
                tags: ["老牌民办", "中考成绩好", "学费亲民"],
                review: "闵行区老牌民办学校，中考成绩稳定。学费相对亲民，是性价比较高的选择。课业管理严格。"
            },
            {
                name: "上海上师初级中学",
                type: "民办",
                stage: "初中",
                rating: 4.1,
                tuition: "3-4万/年",
                location: "闵行区浦江镇",
                address: "上海市闵行区浦江镇浦锦路",
                lat: 31.0756,
                lng: 121.5056,
                students: "约900人",
                tags: ["上师大背景", "师资稳定", "素质教育"],
                review: "上海师范大学背景，师资较稳定。注重素质教育，作业量适中。适合追求全面发展的家庭。"
            }
        ];

        let userLocation = null;
        let schoolsWithDistance = [...schools];

        // 检查位置并提示
        function checkLocation() {
            if (!userLocation) {
                if (confirm('💡 提示：获取您的位置后，可以显示从家到学校的导航路线。\n\n是否现在获取位置？')) {
                    getLocation();
                }
            }
            return true;
        }

        // 计算两点间距离（使用Haversine公式）
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371; // 地球半径（公里）
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // 估算开车时间（考虑上海市区交通情况）
        function estimateDriveTime(distance) {
            // 市区平均速度约25-35km/h
            const avgSpeed = 30;
            const timeHours = distance / avgSpeed;
            const timeMinutes = Math.round(timeHours * 60);
            
            if (timeMinutes < 60) {
                return `${timeMinutes}分钟`;
            } else {
                const hours = Math.floor(timeMinutes / 60);
                const mins = timeMinutes % 60;
                return mins > 0 ? `${hours}小时${mins}分钟` : `${hours}小时`;
            }
        }

        // 获取用户位置
        function getLocation() {
            const btn = document.getElementById('locationBtn');
            const btnText = document.getElementById('btnText');
            const status = document.getElementById('locationStatus');
            const errorMsg = document.getElementById('errorMessage');
            
            if (!navigator.geolocation) {
                showError("您的浏览器不支持地理定位功能");
                return;
            }

            btn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span> 获取中...';
            errorMsg.style.display = 'none';

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    
                    // 计算每所学校的距离
                    schoolsWithDistance = schools.map(school => {
                        const distance = calculateDistance(
                            userLocation.lat, userLocation.lng,
                            school.lat, school.lng
                        );
                        return {
                            ...school,
                            distance: distance,
                            driveTime: estimateDriveTime(distance)
                        };
                    });

                    // 更新UI
                    status.className = 'location-status active';
                    status.innerHTML = `
                        <span>📍</span>
                        <span>已获取位置 - 已计算到${schools.length}所学校的距离</span>
                    `;
                    
                    btnText.textContent = '📍 重新获取位置';
                    btn.disabled = false;
                    
                    // 启用距离排序选项
                    const distanceSort = document.getElementById('distanceSortOption');
                    distanceSort.disabled = false;
                    distanceSort.textContent = '按距离排序';
                    
                    // 默认按距离排序
                    document.getElementById('sortBy').value = 'distance';
                    sortSchools();
                },
                (error) => {
                    btn.disabled = false;
                    btnText.textContent = '📍 获取我的位置';
                    
                    let message = "获取位置失败";
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            message = "请允许访问您的位置信息";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            message = "无法获取位置信息，请检查GPS是否开启";
                            break;
                        case error.TIMEOUT:
                            message = "获取位置超时，请重试";
                            break;
                    }
                    showError(message);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 60000
                }
            );
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = '⚠️ ' + message;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 5000);
        }

        function sortSchools() {
            const sortBy = document.getElementById('sortBy').value;
            
            if (sortBy === 'distance' && userLocation) {
                schoolsWithDistance.sort((a, b) => a.distance - b.distance);
            } else {
                schoolsWithDistance.sort((a, b) => b.rating - a.rating);
            }
            
            filterSchools();
        }

        function renderSchools(schoolList) {
            const grid = document.getElementById('schoolGrid');
            
            if (schoolList.length === 0) {
                grid.innerHTML = '<div style="text-align: center; color: white; padding: 40px;">没有找到匹配的学校</div>';
                return;
            }
            
            grid.innerHTML = schoolList.map((school, index) => {
                const isNearby = school.distance && school.distance < 5;
                const distanceHtml = school.distance ? `
                    <div class="distance-badge ${isNearby ? 'nearby' : ''}">
                        <span>🚗</span>
                        <span>${school.distance.toFixed(1)}公里 · 约${school.driveTime}</span>
                        ${isNearby ? '<span>⭐最近</span>' : ''}
                    </div>
                ` : '';
                
                // 根据是否有用户位置，生成不同的地图链接
                let mapUrl;
                if (userLocation) {
                    // 使用百度地图路线规划（从我家到学校）
                    mapUrl = `https://api.map.baidu.com/direction?origin=${userLocation.lat},${userLocation.lng}&destination=${school.lat},${school.lng}&mode=driving&output=html`;
                } else {
                    // 没有位置时，只显示学校位置
                    mapUrl = `https://api.map.baidu.com/marker?location=${school.lat},${school.lng}&title=${encodeURIComponent(school.name)}&content=${encodeURIComponent(school.address)}&output=html`;
                }
                
                // 备选：使用高德地图（更稳定）
                let amapUrl;
                if (userLocation) {
                    amapUrl = `https://uri.amap.com/navigation?from=${userLocation.lng},${userLocation.lat},我的位置&to=${school.lng},${school.lat},${encodeURIComponent(school.name)}&mode=car&policy=1`;
                } else {
                    amapUrl = `https://uri.amap.com/marker?position=${school.lng},${school.lat}&name=${encodeURIComponent(school.name)}`;
                }
                
                return `
                <div class="school-card ${isNearby ? 'nearby' : ''}" data-type="${school.type}" data-stage="${school.stage}">
                    <div class="school-header">
                        <div class="school-name">${school.name}</div>
                        <span class="school-type">${school.type}</span>
                    </div>
                    ${distanceHtml}
                    <div class="rating">
                        <span class="stars">${'★'.repeat(Math.floor(school.rating))}${'☆'.repeat(5-Math.floor(school.rating))}</span>
                        <span class="score">${school.rating}</span>
                    </div>
                    <div class="info-row">
                        <div class="info-item">📍 ${school.location}</div>
                        <div class="info-item">👥 ${school.students}</div>
                    </div>
                    <div class="info-row">
                        <div class="info-item">💰 ${school.tuition}</div>
                        <div class="info-item">📚 ${school.stage}</div>
                    </div>
                    <div class="tags">
                        ${school.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
                        <a href="${amapUrl}" target="_blank" class="map-link" onclick="return checkLocation()">
                            🗺️ ${userLocation ? '查看导航路线' : '查看学校位置'}
                        </a>
                        ${userLocation ? `<span style="color: #999; font-size: 0.8rem;">(${school.address})</span>` : ''}
                    </div>
                    <div class="review-section">
                        <div class="review-title">家长评价</div>
                        <div class="review-text">${school.review}</div>
                    </div>
                </div>
            `}).join('');
        }

        function filterSchools() {
            const type = document.getElementById('typeFilter').value;
            const stage = document.getElementById('stageFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = schoolsWithDistance;
            
            if (type) {
                filtered = filtered.filter(s => s.type === type);
            }
            if (stage) {
                filtered = filtered.filter(s => s.stage === stage || s.stage === 'K12');
            }
            if (search) {
                filtered = filtered.filter(s => s.name.toLowerCase().includes(search));
            }

            renderSchools(filtered);
        }

        // 初始化渲染
        renderSchools(schoolsWithDistance);
        
        // 页面加载完成后自动获取位置
        window.addEventListener('load', () => {
            // 延迟1秒获取，让页面先渲染完成
            setTimeout(() => {
                autoGetLocation();
            }, 1000);
        });
        
        // 自动获取位置（不显示按钮加载状态）
        function autoGetLocation() {
            const status = document.getElementById('locationStatus');
            const errorMsg = document.getElementById('errorMessage');
            
            if (!navigator.geolocation) {
                status.innerHTML = `
                    <span>📍</span>
                    <span>浏览器不支持定位 - 请手动点击获取位置</span>
                `;
                return;
            }

            status.innerHTML = `
                <span>📍</span>
                <span>正在获取您的位置...</span>
                <span class="loading"></span>
            `;
            errorMsg.style.display = 'none';

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    
                    // 计算每所学校的距离
                    schoolsWithDistance = schools.map(school => {
                        const distance = calculateDistance(
                            userLocation.lat, userLocation.lng,
                            school.lat, school.lng
                        );
                        return {
                            ...school,
                            distance: distance,
                            driveTime: estimateDriveTime(distance)
                        };
                    });

                    // 更新UI
                    status.className = 'location-status active';
                    status.innerHTML = `
                        <span>📍</span>
                        <span>已获取位置 - 已计算到${schools.length}所学校的距离</span>
                    `;
                    
                    // 更新按钮文字
                    const btnText = document.getElementById('btnText');
                    if (btnText) {
                        btnText.textContent = '📍 重新获取位置';
                    }
                    
                    // 启用距离排序选项
                    const distanceSort = document.getElementById('distanceSortOption');
                    distanceSort.disabled = false;
                    distanceSort.textContent = '按距离排序';
                    
                    // 默认按距离排序并刷新显示
                    document.getElementById('sortBy').value = 'distance';
                    sortSchools();
                },
                (error) => {
                    let message = "获取位置失败";
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            message = "请允许访问位置信息以查看距离和导航";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            message = "无法获取位置，请检查GPS是否开启";
                            break;
                        case error.TIMEOUT:
                            message = "获取位置超时";
                            break;
                    }
                    status.innerHTML = `
                        <span>📍</span>
                        <span>${message} - 可点击右侧按钮重试</span>
                    `;
                    showError(message);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 60000
                }
            );
        }
    </script>
</body>
</html>
